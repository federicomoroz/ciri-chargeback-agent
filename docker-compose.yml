version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      - CB_QDRANT_URL=http://qdrant:6333
      - CB_SQLITE_PATH=/app/data/chargeback.db
      - CB_DATA_FILE_PATH=/app/data/Similación_dataset_contracargos_.xlsx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    volumes:
      - ./n8n/data:/home/node/.n8n
    env_file: .env           # passes CB_ANTHROPIC_API_KEY to n8n env
    environment:
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=http://localhost:5678
      - N8N_DEFAULT_LOCALE=es
      - N8N_PUBLIC_API_ENABLED=true
      - N8N_ENCRYPTION_KEY=ciri-chargeback-local-key-2024
    depends_on:
      api:
        condition: service_healthy

volumes:
  qdrant_storage:
